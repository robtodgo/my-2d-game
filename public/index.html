<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2D Survival · Roblox Style</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f1219;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            touch-action: none;
        }
        /* ----- Главное меню (Roblox style) ----- */
        #main-menu {
            background: #1e2432; padding: 30px; border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); text-align: center;
            color: #fff; width: 360px; max-width: 90vw;
            border: 1px solid #3a4a6a;
        }
        #main-menu h2 { color: #6c9eff; margin-top: 0; font-size: 28px; }
        .input-field {
            padding: 12px 15px; font-size: 16px; width: 100%;
            border: none; border-radius: 8px;
            background: #2a3348; color: white; margin: 10px 0;
            outline: 1px solid #4a5a7a;
        }
        .btn {
            padding: 12px 20px; font-size: 18px; font-weight: bold;
            background: #6c9eff; color: white; border: none;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            margin-top: 10px; width: 100%;
        }
        .btn:hover { background: #5a8af0; }
        .btn-secondary { background: #3e4e6e; }
        .btn-secondary:hover { background: #4e5e7e; }
        #error-message { color: #ff7b7b; margin-top: 12px; min-height: 20px; }
        #toggle-mode { color: #6c9eff; cursor: pointer; margin-top: 15px; text-decoration: underline; }

        /* ----- Игровой контейнер ----- */
        #game-container {
            display: none; position: relative;
            width: 100vw; height: 100vh; overflow: hidden;
        }
        canvas {
            display: block; width: 100%; height: 100%;
            object-fit: contain; background: #6a8e5a;
            touch-action: none; cursor: crosshair;
        }

        /* ----- Roblox-меню (левая панель) ----- */
        #roblox-menu {
            position: absolute; top: 20px; left: 20px;
            width: 60px; background: #1e2432dd; backdrop-filter: blur(8px);
            border-radius: 12px; padding: 10px 0;
            border: 1px solid #4a5a7a; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
        }
        .menu-icon {
            width: 44px; height: 44px; margin: 5px 0;
            background: #2a3348; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; cursor: pointer;
            border: 1px solid #5a6a8a; transition: 0.1s;
        }
        .menu-icon:hover { background: #3e4e6e; border-color: #6c9eff; }
        .menu-icon.active { background: #6c9eff; }

        /* Панели, открываемые из меню */
        .side-panel {
            position: absolute; top: 20px; left: 100px;
            background: #1e2432ee; backdrop-filter: blur(8px);
            border: 1px solid #6c9eff; border-radius: 16px;
            padding: 15px; width: 260px; color: white;
            display: none; z-index: 99;
        }
        .side-panel h4 { margin: 0 0 10px 0; color: #6c9eff; }
        #friends-list { list-style: none; padding: 0; margin: 10px 0; max-height: 200px; overflow-y: auto; }
        #friends-list li { padding: 8px; border-bottom: 1px solid #3e4e6e; display: flex; justify-content: space-between; align-items: center; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #2ecc71; display: inline-block; margin-right: 5px; }

        /* Хотбар (Minecraft style) */
        #hotbar-container {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 4px;
            background: rgba(30,36,50,0.9); backdrop-filter: blur(4px);
            padding: 6px 12px; border-radius: 40px;
            border: 1px solid #3e4e6e; z-index: 30;
        }
        .hotbar-slot {
            width: 50px; height: 50px; background: #2a3348;
            border: 2px solid #5a6a8a; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: white; text-shadow: 1px 1px 2px black;
            box-shadow: inset 0 0 5px #00000050;
            cursor: pointer; position: relative;
        }
        .hotbar-slot.selected { border-color: #ffd966; background: #3e4e6e; transform: scale(1.05); }
        .hotbar-slot .item-count { position: absolute; bottom: 2px; right: 4px; font-size: 12px; color: #ddd; }

        /* Инвентарь */
        #inventory-window {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; background: #1e2432dd; backdrop-filter: blur(8px);
            border: 2px solid #6c9eff; border-radius: 16px; padding: 20px;
            display: none; grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 50;
        }
        .inventory-slot {
            aspect-ratio: 1/1; background: #2a3348; border: 2px solid #4a5a7a;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 26px; color: white; cursor: pointer; position: relative;
        }

        /* Чат */
        #chat-box {
            position: absolute; bottom: 130px; left: 20px;
            width: 300px; max-height: 180px; overflow-y: auto;
            background: rgba(0,0,0,0.6); color: white;
            border-radius: 12px; padding: 8px; font-size: 14px;
            pointer-events: none; z-index: 40;
        }
        #chat-input-container {
            position: absolute; bottom: 100px; left: 20px;
            width: 300px; display: none; z-index: 45;
        }
        #chat-input {
            width: 100%; padding: 10px; border-radius: 20px;
            background: #2a3348; border: 1px solid #6c9eff; color: white;
        }

        /* Статус-бар */
        #health-bar-container {
            position: absolute; top: 20px; left: 100px;
            width: 200px; height: 18px; background: #3a2a2a;
            border-radius: 9px; border: 2px solid #5a3a3a;
            overflow: hidden; z-index: 10;
        }
        #health-bar-fill { height: 100%; width: 100%; background: #e74c3c; }
        #health-text { position: absolute; top: 20px; left: 310px; color: white; font-weight: bold; z-index: 10; }
        #ping-fps { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); color: #ccc; padding: 4px 12px; border-radius: 20px; font-size: 13px; z-index: 10; }
        #coords { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.5); color: #ccc; padding: 4px 12px; border-radius: 20px; font-size: 13px; z-index: 10; }
        #version-tag { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.4); color: #aaa; padding: 3px 12px; border-radius: 20px; font-size: 12px; z-index: 10; }

        /* Мобильные кнопки */
        #mobile-controls {
            position: absolute; bottom: 90px; left: 0; right: 0;
            display: flex; justify-content: space-between;
            padding: 0 20px; pointer-events: none; z-index: 20;
        }
        #joystick-area {
            width: 140px; height: 140px; background: rgba(20,25,40,0.4);
            border-radius: 70px; backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.25);
            pointer-events: auto; touch-action: none; position: relative;
        }
        #joystick-thumb {
            position: absolute; width: 70px; height: 70px;
            background: rgba(108,158,255,0.7); border-radius: 35px;
            left: 35px; top: 35px; border: 3px solid white;
            pointer-events: none;
        }
        .mobile-btn {
            width: 80px; height: 80px; border-radius: 40px;
            background: rgba(200,70,70,0.7); backdrop-filter: blur(8px);
            border: 3px solid rgba(255,255,255,0.5);
            color: white; font-weight: bold; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; touch-action: none;
        }
        .mobile-btn:active { transform: scale(0.95); }

        @media (pointer: fine) { #mobile-controls { display: none; } }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu">
        <h2>🎮 Survival</h2>
        <input type="text" id="nickname-input" class="input-field" placeholder="Логин (макс. 12)" maxlength="12" autocomplete="off">
        <input type="password" id="password-input" class="input-field" placeholder="Пароль" autocomplete="off">
        <div><input type="color" id="player-color" value="#3498db" style="width:100%; height:40px; border:none; border-radius:8px;"></div>
        <div style="margin:10px 0;">
            <input type="file" id="avatar-input" accept="image/*" style="display:none;">
            <button class="btn btn-secondary" id="upload-avatar-btn">📷 Загрузить аватар</button>
            <img id="avatar-preview" src="" style="width:40px; height:40px; border-radius:50%; object-fit:cover; display:none; margin-left:10px;">
        </div>
        <button class="btn" id="join-btn">Войти</button>
        <div id="error-message"></div>
        <div id="toggle-mode">Нет аккаунта? Зарегистрироваться</div>
    </div>

    <!-- Игровой контейнер -->
    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>

        <!-- Roblox-меню (левая панель) -->
        <div id="roblox-menu">
            <div class="menu-icon" data-panel="friends">👥</div>
            <div class="menu-icon" data-panel="inventory">🎒</div>
            <div class="menu-icon" data-panel="settings">⚙️</div>
            <div class="menu-icon" data-panel="logout">🚪</div>
        </div>

        <!-- Панели -->
        <div id="friends-panel" class="side-panel">
            <h4>👥 Друзья</h4>
            <ul id="friends-list"></ul>
            <input type="text" id="friend-nick-input" placeholder="Ник друга" maxlength="12" style="width:100%; padding:8px; border-radius:8px; border:none; background:#2a3348; color:white;">
            <button class="btn" id="add-friend-btn" style="padding:8px; font-size:14px;">Добавить</button>
        </div>
        <div id="settings-panel" class="side-panel">
            <h4>⚙️ Настройки</h4>
            <p>Здесь будут настройки</p>
        </div>

        <!-- UI элементы -->
        <div id="health-bar-container"><div id="health-bar-fill"></div></div>
        <div id="health-text">❤️ 100/100</div>
        <div id="ping-fps">🔌 Подключение...</div>
        <div id="coords">x: 0, y: 0</div>
        <div id="version-tag">v4.0 · Roblox UI</div>

        <div id="hotbar-container"></div>
        <div id="inventory-window"></div>

        <div id="chat-box"></div>
        <div id="chat-input-container"><input type="text" id="chat-input" placeholder="Нажмите Enter для чата" autocomplete="off"></div>

        <!-- Мобильные контролы -->
        <div id="mobile-controls">
            <div id="joystick-area"><div id="joystick-thumb"></div></div>
            <div style="display: flex; gap: 10px;">
                <div class="mobile-btn" id="attack-mobile-btn">⚔️</div>
                <div class="mobile-btn" id="inventory-mobile-btn">🎒</div>
                <div class="mobile-btn" id="chat-mobile-btn">💬</div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";
            // ---------- DOM ----------
            const mainMenu = document.getElementById('main-menu');
            const gameContainer = document.getElementById('game-container');
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const nicknameInput = document.getElementById('nickname-input');
            const passwordInput = document.getElementById('password-input');
            const colorInput = document.getElementById('player-color');
            const avatarInput = document.getElementById('avatar-input');
            const avatarPreview = document.getElementById('avatar-preview');
            const uploadAvatarBtn = document.getElementById('upload-avatar-btn');
            const joinBtn = document.getElementById('join-btn');
            const errorMsg = document.getElementById('error-message');
            const toggleMode = document.getElementById('toggle-mode');
            const robloxMenu = document.getElementById('roblox-menu');
            const friendsPanel = document.getElementById('friends-panel');
            const settingsPanel = document.getElementById('settings-panel');
            const friendsList = document.getElementById('friends-list');
            const friendNickInput = document.getElementById('friend-nick-input');
            const addFriendBtn = document.getElementById('add-friend-btn');
            const healthFill = document.getElementById('health-bar-fill');
            const healthText = document.getElementById('health-text');
            const pingFpsDiv = document.getElementById('ping-fps');
            const coordsDiv = document.getElementById('coords');
            const hotbarContainer = document.getElementById('hotbar-container');
            const inventoryWindow = document.getElementById('inventory-window');
            const chatBox = document.getElementById('chat-box');
            const chatInputContainer = document.getElementById('chat-input-container');
            const chatInput = document.getElementById('chat-input');
            const joystickArea = document.getElementById('joystick-area');
            const joystickThumb = document.getElementById('joystick-thumb');
            const attackMobileBtn = document.getElementById('attack-mobile-btn');
            const inventoryMobileBtn = document.getElementById('inventory-mobile-btn');
            const chatMobileBtn = document.getElementById('chat-mobile-btn');

            // ---------- Состояние ----------
            let socket, selfPlayer = null, players = {}, mapWidth = 3000, mapHeight = 3000, tileSize = 40;
            let camera = { x: 0, y: 0 }, worldTiles = [];
            let clientX = 0, clientY = 0, serverX = 0, serverY = 0;
            const interpolated = {}, INTERP = 0.3;
            const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
            let joystickActive = false, joyVec = { x:0, y:0 };
            let inventory = [], selectedSlot = 0, invOpen = false, hotbarSlots = [];
            let chatOpen = false, registerMode = false, avatarDataURL = null, friends = [];
            let latency = 0, fps = 60, lastPing = 0, frameCount = 0, lastFps = performance.now();

            // ---------- UI Функции ----------
            function createHotbar() {
                hotbarContainer.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const s = document.createElement('div');
                    s.className = 'hotbar-slot' + (i === selectedSlot ? ' selected' : '');
                    s.dataset.index = i;
                    s.addEventListener('click', () => selectSlot(i));
                    hotbarContainer.appendChild(s);
                    hotbarSlots.push(s);
                }
                updateHotbar();
            }
            function selectSlot(i) { selectedSlot = i; hotbarSlots.forEach((s, idx) => s.classList.toggle('selected', idx === i)); socket?.emit('select slot', i); }
            function updateHotbar() { for (let i=0;i<9;i++) { const it = inventory[i]; hotbarSlots[i].innerHTML = it ? `${it.emoji||'📦'}<span class="item-count">${it.count>1?it.count:''}</span>` : ''; } }
            function renderInventory() {
                if (!invOpen) { inventoryWindow.style.display = 'none'; return; }
                inventoryWindow.style.display = 'grid';
                inventoryWindow.innerHTML = '';
                for (let i=0; i<inventory.length; i++) {
                    const s = document.createElement('div'); s.className = 'inventory-slot'; s.dataset.index = i;
                    const it = inventory[i]; s.innerHTML = it ? `${it.emoji||'📦'}<span class="item-count">${it.count>1?it.count:''}</span>` : '';
                    s.addEventListener('click', (e) => {
                        if (e.shiftKey) { const t = inventory[i]; inventory[i] = inventory[selectedSlot]; inventory[selectedSlot] = t; updateHotbar(); renderInventory(); socket.emit('inventory update', { inventory, selectedSlot }); }
                        else { selectSlot(i); invOpen = false; renderInventory(); }
                    });
                    inventoryWindow.appendChild(s);
                }
            }
            function addChat(sender, text) {
                const d = document.createElement('div'); d.innerHTML = `<b>${sender}:</b> ${text}`; chatBox.appendChild(d); chatBox.scrollTop = chatBox.scrollHeight;
                while (chatBox.children.length > 15) chatBox.removeChild(chatBox.firstChild);
            }
            function updateHealth() { if (selfPlayer) { const p = selfPlayer.hp/selfPlayer.maxHp*100; healthFill.style.width = p+'%'; healthText.textContent = `❤️ ${selfPlayer.hp}/${selfPlayer.maxHp}`; } }
            function updateFriendsUI() {
                friendsList.innerHTML = friends.map(f => `<li><span><span class="online-dot" style="background:${Object.values(players).some(p=>p.nickname===f)?'#2ecc71':'#95a5a6'};"></span>${f}</span> <button data-nick="${f}" class="tp-friend" style="background:none;border:none;color:#6c9eff;">➡️</button></li>`).join('');
                document.querySelectorAll('.tp-friend').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); socket.emit('chat message', '/tp '+b.dataset.nick); }));
            }

            // ---------- Сеть ----------
            function connect() {
                socket = io({ transports: ['websocket'], upgrade: false });
                socket.on('connect', () => updatePingFps());
                socket.on('disconnect', () => updatePingFps(true));
                socket.on('init', (data) => {
                    players = data.players; selfPlayer = players[socket.id];
                    mapWidth = data.map.width; mapHeight = data.map.height; tileSize = data.map.tileSize||40;
                    worldTiles = data.worldTiles||[]; inventory = selfPlayer.inventory||[]; selectedSlot = selfPlayer.selectedSlot||0;
                    clientX = serverX = selfPlayer.x; clientY = serverY = selfPlayer.y;
                    friends = data.friends||[];
                    for (let id in players) if (id !== selfPlayer.id) interpolated[id] = { x: players[id].x, y: players[id].y };
                    mainMenu.style.display = 'none'; gameContainer.style.display = 'block';
                    createHotbar(); updateHealth(); updateCamera(); updateFriendsUI();
                    requestAnimationFrame(gameLoop);
                    lastPing = performance.now(); socket.emit('ping');
                    addChat('📢', 'Добро пожаловать! Используйте меню слева.');
                });
                socket.on('player joined', (p) => { players[p.id]=p; interpolated[p.id]={x:p.x,y:p.y}; updateFriendsUI(); });
                socket.on('player left', (id) => { delete players[id]; delete interpolated[id]; updateFriendsUI(); });
                socket.on('player moved', (data) => {
                    const p = players[data.id]; if (!p) return;
                    if (data.id === selfPlayer?.id) { serverX=data.x; serverY=data.y; clientX+=(data.x-clientX)*0.2; clientY+=(data.y-clientY)*0.2; selfPlayer.x=clientX; selfPlayer.y=clientY; }
                    else interpolated[data.id] = { x: data.x, y: data.y };
                });
                socket.on('player damaged', (data) => { if (players[data.id]) players[data.id].hp = data.hp; if (selfPlayer && data.id===selfPlayer.id) updateHealth(); });
                socket.on('player respawned', (data) => { if (players[data.id]) { players[data.id].x=data.x; players[data.id].y=data.y; players[data.id].hp=data.hp; } if (selfPlayer && data.id===selfPlayer.id) { clientX=serverX=data.x; clientY=serverY=data.y; updateHealth(); } });
                socket.on('player hp', (data) => { if (selfPlayer && data.id===selfPlayer.id) { selfPlayer.hp=data.hp; updateHealth(); } });
                socket.on('inventory update', (data) => { if (data.id===socket.id||data.inventory) { inventory=data.inventory; if(selfPlayer)selfPlayer.inventory=inventory; selectedSlot=data.selectedSlot; updateHotbar(); if(invOpen) renderInventory(); } });
                socket.on('block update', (data) => { if (worldTiles[data.tileX]) worldTiles[data.tileX][data.tileY] = data.block; });
                socket.on('chat message', (data) => addChat(data.sender, data.text));
                socket.on('friend request', (data) => addChat('📨', `Заявка от ${data.from}. /friend accept ${data.from}`));
                socket.on('friend accepted', (data) => addChat('✅', `${data.by} принял заявку`));
                socket.on('friends update', (list) => { friends = list; updateFriendsUI(); });
                socket.on('logged out', () => { gameContainer.style.display='none'; mainMenu.style.display='block'; });
                socket.on('pong', () => { latency = Math.round(performance.now() - lastPing); updatePingFps(); });
                setInterval(() => { if (socket?.connected) { lastPing = performance.now(); socket.emit('ping'); } }, 2000);
            }
            function updatePingFps(dc=false) { pingFpsDiv.textContent = dc ? '🔴 Отключено' : `📶 ${latency}ms | 🎮 ${fps} FPS`; }

            // ---------- Аутентификация ----------
            uploadAvatarBtn.addEventListener('click', () => avatarInput.click());
            avatarInput.addEventListener('change', (e) => {
                const f = e.target.files[0]; if (!f) return;
                const r = new FileReader(); r.onload = (ev) => { const img = new Image(); img.onload = () => { const c=document.createElement('canvas'); c.width=c.height=64; c.getContext('2d').drawImage(img,0,0,64,64); avatarDataURL=c.toDataURL(); avatarPreview.src=avatarDataURL; avatarPreview.style.display='inline-block'; }; img.src=ev.target.result; }; r.readAsDataURL(f);
            });
            function tryAuth() {
                const nick = nicknameInput.value.trim().substring(0,12), pwd = passwordInput.value;
                if (!nick||!pwd) { errorMsg.textContent='Заполните поля'; return; }
                if (!socket) connect();
                const ev = registerMode ? 'register' : 'login';
                const data = { nickname: nick, password: pwd, color: colorInput.value };
                if (avatarDataURL) data.avatar = avatarDataURL;
                socket.emit(ev, data, (res) => {
                    if (res.success) { errorMsg.textContent=''; if (registerMode) socket.emit('login', { nickname: nick, password: pwd }, (r) => { if (!r.success) errorMsg.textContent=r.message; }); }
                    else errorMsg.textContent=res.message;
                });
            }
            joinBtn.addEventListener('click', tryAuth);
            nicknameInput.addEventListener('keypress', (e) => { if (e.key==='Enter') tryAuth(); });
            passwordInput.addEventListener('keypress', (e) => { if (e.key==='Enter') tryAuth(); });
            toggleMode.addEventListener('click', () => { registerMode=!registerMode; joinBtn.textContent=registerMode?'Зарегистрироваться':'Войти'; toggleMode.textContent=registerMode?'Уже есть аккаунт? Войти':'Нет аккаунта? Зарегистрироваться'; });

            // ---------- Roblox меню ----------
            document.querySelectorAll('.menu-icon').forEach(icon => {
                icon.addEventListener('click', () => {
                    const panel = icon.dataset.panel;
                    if (panel === 'logout') { socket.emit('logout'); }
                    else if (panel === 'friends') { friendsPanel.style.display = friendsPanel.style.display === 'none' ? 'block' : 'none'; settingsPanel.style.display='none'; }
                    else if (panel === 'inventory') { invOpen = !invOpen; renderInventory(); }
                    else if (panel === 'settings') { settingsPanel.style.display = settingsPanel.style.display === 'none' ? 'block' : 'none'; friendsPanel.style.display='none'; }
                });
            });
            addFriendBtn.addEventListener('click', () => {
                const nick = friendNickInput.value.trim().substring(0,12); if (!nick) return;
                socket.emit('chat message', '/friend add ' + nick); friendNickInput.value = '';
            });

            // ---------- Управление (ПК) ----------
            window.addEventListener('keydown', (e) => {
                if (chatOpen || invOpen) { if (e.code==='Escape') { closeChat(); e.preventDefault(); } return; }
                if (e.code in keys) { keys[e.code]=true; e.preventDefault(); }
                if (e.code==='KeyE') { invOpen=!invOpen; renderInventory(); e.preventDefault(); }
                if (e.code==='KeyF') { performAttack(); e.preventDefault(); }
                if (e.code==='Enter') { openChat(); e.preventDefault(); }
                if (e.code==='Backquote') { openChat(true); e.preventDefault(); }
                if (!isNaN(parseInt(e.key)) && e.key>='1' && e.key<='9') { selectSlot(parseInt(e.key)-1); e.preventDefault(); }
                if (e.code==='Escape' && invOpen) { invOpen=false; renderInventory(); }
            });
            window.addEventListener('keyup', (e) => { if (e.code in keys) { keys[e.code]=false; e.preventDefault(); } });
            window.addEventListener('blur', () => { for (let k in keys) keys[k]=false; });
            canvas.addEventListener('mousedown', (e) => { if (e.button===0) performAttackFromEvent(e); });
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());

            function closeChat() { chatOpen=false; chatInputContainer.style.display='none'; chatInput.value=''; }
            function openChat(asConsole=false) { chatOpen=true; chatInputContainer.style.display='block'; chatInput.value=asConsole?'/':''; chatInput.focus(); }
            chatInput.addEventListener('keydown', (e) => {
                if (e.key==='Enter') { const txt = chatInput.value.trim(); if (txt) socket.emit('chat message', txt); closeChat(); e.preventDefault(); }
                if (e.key==='Escape') { closeChat(); e.preventDefault(); }
            });

            // ---------- Мобильное управление ----------
            (function setupJoy() {
                joystickArea.addEventListener('touchstart', (e) => { e.preventDefault(); joystickActive=true; updateJoy(e.touches[0]); });
                joystickArea.addEventListener('touchmove', (e) => { e.preventDefault(); if (joystickActive) updateJoy(e.touches[0]); });
                joystickArea.addEventListener('touchend', (e) => { e.preventDefault(); joystickActive=false; joyVec={x:0,y:0}; joystickThumb.style.transform='translate(0,0)'; });
                function updateJoy(t) {
                    const r = joystickArea.getBoundingClientRect(), cx = r.left+r.width/2, cy = r.top+r.height/2;
                    let dx = t.clientX - cx, dy = t.clientY - cy;
                    const dist = Math.sqrt(dx*dx+dy*dy), max=50;
                    if (dist>max) { dx=dx/dist*max; dy=dy/dist*max; }
                    joystickThumb.style.transform = `translate(${dx}px, ${dy}px)`;
                    joyVec = { x: dx/max, y: dy/max };
                }
            })();
            attackMobileBtn.addEventListener('touchstart', (e) => { e.preventDefault(); performAttack(); });
            inventoryMobileBtn.addEventListener('touchstart', (e) => { e.preventDefault(); invOpen=!invOpen; renderInventory(); });
            chatMobileBtn.addEventListener('touchstart', (e) => { e.preventDefault(); openChat(); });

            // ---------- Атака ----------
            function performAttack() {
                if (!selfPlayer) return;
                const dir = getDir(); let closest=null, min=80;
                for (let id in players) {
                    if (id===selfPlayer.id) continue;
                    const p = players[id];
                    if ((p.x-selfPlayer.x)*dir.x + (p.y-selfPlayer.y)*dir.y < 0) continue;
                    const d = Math.hypot(p.x-selfPlayer.x, p.y-selfPlayer.y);
                    if (d<min) { min=d; closest=id; }
                }
                if (closest) socket.emit('attack', closest);
            }
            function performAttackFromEvent(e) {
                if (!selfPlayer) return;
                const rect = canvas.getBoundingClientRect(), sx = canvas.width/rect.width, sy = canvas.height/rect.height;
                const wx = (e.clientX-rect.left)*sx + camera.x, wy = (e.clientY-rect.top)*sy + camera.y;
                let closest=null, min=60;
                for (let id in players) {
                    if (id===selfPlayer.id) continue;
                    const p = players[id], d = Math.hypot(p.x-wx, p.y-wy);
                    if (d<min) { min=d; closest=id; }
                }
                if (closest) socket.emit('attack', closest);
            }
            function getDir() {
                if (joystickActive && (joyVec.x||joyVec.y)) return joyVec;
                let dx=0, dy=0;
                if (keys.KeyW||keys.ArrowUp) dy-=1;
                if (keys.KeyS||keys.ArrowDown) dy+=1;
                if (keys.KeyA||keys.ArrowLeft) dx-=1;
                if (keys.KeyD||keys.ArrowRight) dx+=1;
                if (dx===0&&dy===0) return {x:1,y:0};
                const l = Math.sqrt(dx*dx+dy*dy); return {x:dx/l, y:dy/l};
            }

            // ---------- Движение и рендеринг ----------
            function handleInput() {
                if (!selfPlayer || chatOpen || invOpen) return;
                let dx=0, dy=0;
                if (keys.KeyW||keys.ArrowUp) dy-=1;
                if (keys.KeyS||keys.ArrowDown) dy+=1;
                if (keys.KeyA||keys.ArrowLeft) dx-=1;
                if (keys.KeyD||keys.ArrowRight) dx+=1;
                if (joystickActive && (joyVec.x||joyVec.y)) { dx=joyVec.x; dy=joyVec.y; }
                if (dx||dy) {
                    const l = Math.sqrt(dx*dx+dy*dy); dx = dx/l * 5.5; dy = dy/l * 5.5;
                    let nx = clientX + dx, ny = clientY + dy;
                    nx = Math.max(20, Math.min(mapWidth-20, nx)); ny = Math.max(20, Math.min(mapHeight-20, ny));
                    clientX = nx; clientY = ny; selfPlayer.x = nx; selfPlayer.y = ny;
                    socket.emit('move', { x: nx, y: ny });
                } else {
                    clientX += (serverX - clientX) * 0.1;
                    clientY += (serverY - clientY) * 0.1;
                    selfPlayer.x = clientX; selfPlayer.y = clientY;
                }
            }
            function interpolate() { for (let id in interpolated) { const p=players[id]; if(p) { const t=interpolated[id]; p.x+=(t.x-p.x)*INTERP; p.y+=(t.y-p.y)*INTERP; } } }
            function updateCamera() { if (!selfPlayer) return; camera.x = Math.max(0, Math.min(mapWidth-canvas.width, selfPlayer.x-canvas.width/2)); camera.y = Math.max(0, Math.min(mapHeight-canvas.height, selfPlayer.y-canvas.height/2)); }
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.save(); ctx.translate(-camera.x, -camera.y);
                if (worldTiles) for (let tx=0; tx<worldTiles.length; tx++) for (let ty=0; ty<worldTiles[tx].length; ty++) if (worldTiles[tx][ty]) {
                    const x=tx*tileSize, y=ty*tileSize;
                    if (x+tileSize<camera.x||x>camera.x+canvas.width||y+tileSize<camera.y||y>camera.y+canvas.height) continue;
                    ctx.fillStyle='#5d4a2e'; ctx.fillRect(x,y,tileSize,tileSize);
                    ctx.strokeStyle='#3a2e1e'; ctx.lineWidth=1; ctx.strokeRect(x,y,tileSize,tileSize);
                    ctx.fillStyle='#3c8c3c'; ctx.fillRect(x+2,y+2,tileSize-4,5);
                }
                ctx.strokeStyle='#7a9a6c'; ctx.lineWidth=0.5;
                for (let i=0;i<=mapWidth;i+=tileSize) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,mapHeight); ctx.stroke(); }
                for (let i=0;i<=mapHeight;i+=tileSize) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(mapWidth,i); ctx.stroke(); }
                for (let id in players) {
                    const p = players[id];
                    if (p.x+30<camera.x||p.x-30>camera.x+canvas.width||p.y+30<camera.y||p.y-30>camera.y+canvas.height) continue;
                    if (p.avatar) { const img = new Image(); img.src=p.avatar; if (img.complete) { ctx.save(); ctx.beginPath(); ctx.arc(p.x,p.y,18,0,2*Math.PI); ctx.clip(); ctx.drawImage(img,p.x-18,p.y-18,36,36); ctx.restore(); } else drawDefault(p,id); }
                    else drawDefault(p,id);
                    const hp = p.hp/p.maxHp; ctx.fillStyle='#333'; ctx.fillRect(p.x-25,p.y-40,50,6); ctx.fillStyle=hp>0.6?'#2ecc71':'#e74c3c'; ctx.fillRect(p.x-25,p.y-40,50*hp,6);
                    ctx.font='bold 14px "Segoe UI"'; ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.fillText(p.nickname,p.x,p.y-48);
                }
                ctx.restore();
                if (selfPlayer) coordsDiv.textContent = `📍 ${Math.round(selfPlayer.x)} ${Math.round(selfPlayer.y)}`;
            }
            function drawDefault(p,id) {
                ctx.shadowColor='#00000060'; ctx.shadowBlur=12; ctx.shadowOffsetY=3;
                ctx.beginPath(); ctx.arc(p.x,p.y,18,0,2*Math.PI);
                const grad = ctx.createRadialGradient(p.x-5,p.y-5,3,p.x,p.y,18);
                if (id===selfPlayer?.id) { grad.addColorStop(0,'#aad0ff'); grad.addColorStop(1,p.color||'#3498db'); }
                else { grad.addColorStop(0,'#ffb0b0'); grad.addColorStop(1,p.color||'#e74c3c'); }
                ctx.fillStyle=grad; ctx.fill();
                ctx.shadowBlur=0; ctx.shadowOffsetY=0; ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
            }
            function gameLoop() {
                handleInput(); interpolate(); updateCamera(); draw();
                frameCount++; const now=performance.now(); if(now-lastFps>=1000) { fps=frameCount; frameCount=0; lastFps=now; updatePingFps(); }
                requestAnimationFrame(gameLoop);
            }
            window.addEventListener('beforeunload', ()=> socket?.disconnect());
            function resizeCanvas() { canvas.width = gameContainer.clientWidth; canvas.height = gameContainer.clientHeight; updateCamera(); }
            window.addEventListener('resize', resizeCanvas);
            new ResizeObserver(()=>{ if(gameContainer.style.display!=='none') resizeCanvas(); }).observe(gameContainer);
        })();
    </script>
</body>
</html>
