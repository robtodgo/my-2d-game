<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Pixel Battle</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; margin: 0; display: flex; height: 100vh; }
        #login { width: 300px; margin: auto; background: #16213e; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        #game { display: none; width: 100%; }
        #sidebar { width: 200px; background: #16213e; padding: 10px; display: flex; flex-direction: column; }
        #canvas-wrap { flex: 1; display: flex; justify-content: center; align-items: center; background: #0f3460; }
        canvas { background: white; width: min(80vw, 80vh); height: min(80vw, 80vh); image-rendering: pixelated; }
        #chat { flex: 1; overflow-y: auto; background: #0f3460; padding: 5px; margin: 5px 0; }
        #colors { display: flex; flex-wrap: wrap; gap: 5px; }
        .color-btn { width: 30px; height: 30px; border: 2px solid white; cursor: pointer; }
        #status { color: #e94560; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="login">
    <h3>🎨 Pixel Battle</h3>
    <input id="nick" placeholder="Логин" maxlength="15">
    <input id="pass" type="password" placeholder="Пароль">
    <button id="loginBtn">Войти</button>
    <button id="regBtn">Регистрация</button>
    <div id="error" style="color:red"></div>
</div>
<div id="game">
    <div id="sidebar">
        <div>👥 Онлайн: <span id="onlineCount">0</span></div>
        <div id="chat"></div>
        <input id="msg" placeholder="Сообщение...">
        <div id="colors">
            <!-- цвета вставятся из JS -->
        </div>
        <button id="logout">Выйти</button>
        <div id="status"></div>
    </div>
    <div id="canvas-wrap">
        <canvas id="canvas" width="80" height="80"></canvas>
    </div>
</div>
<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const SIZE = 80;
    let selectedColor = '#000000';
    let myNick = '';

    const colors = ['#FFFFFF', '#000000', '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF'];
    const colorsDiv = document.getElementById('colors');
    colors.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'color-btn';
        btn.style.background = c;
        btn.onclick = () => selectedColor = c;
        colorsDiv.appendChild(btn);
    });

    // Рендер всего холста
    function drawCanvas(data) {
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE; j++) {
                ctx.fillStyle = data[i][j];
                ctx.fillRect(i, j, 1, 1);
            }
        }
    }

    // Вход/регистрация
    document.getElementById('loginBtn').onclick = () => {
        const nick = document.getElementById('nick').value.trim();
        const pass = document.getElementById('pass').value;
        socket.emit('login', { nick, pass }, (err, canvasData, online) => {
            if (err) return document.getElementById('error').textContent = err;
            myNick = nick;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            drawCanvas(canvasData);
            updateOnline(online);
        });
    };
    document.getElementById('regBtn').onclick = () => {
        const nick = document.getElementById('nick').value.trim();
        const pass = document.getElementById('pass').value;
        socket.emit('register', { nick, pass }, (err) => {
            if (err) document.getElementById('error').textContent = err;
            else alert('Успешно! Теперь войдите.');
        });
    };
    document.getElementById('logout').onclick = () => {
        location.reload();
    };

    // Чат
    const chatDiv = document.getElementById('chat');
    const msgInput = document.getElementById('msg');
    msgInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const msg = msgInput.value.trim();
            if (msg) socket.emit('chat', msg);
            msgInput.value = '';
        }
    };
    socket.on('chat', (from, text) => {
        chatDiv.innerHTML += `<div><b>${from}:</b> ${text}</div>`;
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    // Онлайн
    function updateOnline(list) {
        document.getElementById('onlineCount').textContent = list.length;
    }
    socket.on('online', updateOnline);

    // Рисование
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);
        socket.emit('draw', { x, y, color: selectedColor }, (err) => {
            document.getElementById('status').textContent = err || '';
        });
    });

    socket.on('pixel', (x, y, color) => {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 1, 1);
    });
</script>
</body>
</html>
