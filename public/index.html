<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <style>
        body {
            margin: 0; padding: 20px;
            background: #1a1e2c; color: #e0e5f0;
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center;
        }
        #app {
            max-width: 1000px; width: 100%;
        }
        #auth-panel {
            background: #2a2f42; padding: 20px; border-radius: 16px;
            margin-bottom: 20px; text-align: center;
        }
        .tab-btn {
            background: none; border: none; color: #8a9bb5;
            font-size: 18px; padding: 10px 20px; cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #6c9eff; border-bottom-color: #6c9eff;
        }
        .input-field {
            padding: 10px; font-size: 16px; border-radius: 8px;
            border: none; background: #1e2332; color: white;
            margin: 10px 0; width: 250px;
        }
        .btn {
            padding: 10px 24px; background: #6c9eff; border: none;
            border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; margin: 5px;
        }
        #game-panel {
            display: none;
        }
        #top-bar {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 15px;
        }
        #online-box {
            background: #2a2f42; padding: 8px 16px;
            border-radius: 20px; font-size: 14px;
        }
        #cooldown-timer {
            background: #2a2f42; padding: 8px 16px;
            border-radius: 20px; color: #f1c40f;
        }
        canvas {
            display: block; background: #fff;
            border-radius: 12px; box-shadow: 0 0 20px #00000050;
            width: 100%; height: auto; cursor: crosshair;
        }
        #color-picker-container {
            margin: 15px 0; display: flex; align-items: center;
            gap: 15px;
        }
        #status-msg {
            color: #ff7b7b; margin-left: 10px;
        }
        #logout-btn {
            background: #4a5a7a;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="app">
    <!-- Панель аутентификации -->
    <div id="auth-panel">
        <div>
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>
        <div id="login-form">
            <input type="text" id="login-nickname" class="input-field" placeholder="Логин" maxlength="15" autocomplete="off">
            <br>
            <input type="password" id="login-password" class="input-field" placeholder="Пароль" autocomplete="off">
            <br>
            <button class="btn" id="login-btn">Войти</button>
        </div>
        <div id="register-form" style="display:none;">
            <input type="text" id="reg-nickname" class="input-field" placeholder="Логин" maxlength="15" autocomplete="off">
            <br>
            <input type="password" id="reg-password" class="input-field" placeholder="Пароль" autocomplete="off">
            <br>
            <button class="btn" id="register-btn">Зарегистрироваться</button>
        </div>
        <div id="auth-error" style="color:#ff7b7b; margin-top:10px;"></div>
    </div>

    <!-- Игровая панель -->
    <div id="game-panel">
        <div id="top-bar">
            <div id="online-box">👥 Онлайн: <span id="online-count">0</span></div>
            <div id="cooldown-timer">⏳ Готово</div>
            <button class="btn" id="logout-btn">🚪 Выйти</button>
        </div>
        <canvas id="canvas" width="800" height="600"></canvas>
        <div id="color-picker-container">
            <label for="pixel-color">Цвет:</label>
            <input type="color" id="pixel-color" value="#ff0000">
            <span id="status-msg"></span>
        </div>
        <p style="font-size:13px; color:#8a9bb5;">Кликните по холсту, чтобы поставить пиксель (можно раз в 5 секунд)</p>
    </div>
</div>

<script>
    (function(){
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Вкладки
        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authError = document.getElementById('auth-error');
        
        // Поля
        const loginNick = document.getElementById('login-nickname');
        const loginPass = document.getElementById('login-password');
        const regNick = document.getElementById('reg-nickname');
        const regPass = document.getElementById('reg-password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('logout-btn');
        
        const onlineSpan = document.getElementById('online-count');
        const cooldownDiv = document.getElementById('cooldown-timer');
        const pixelColor = document.getElementById('pixel-color');
        const statusMsg = document.getElementById('status-msg');

        let socket;
        let currentNick = null;
        let canvasData = []; // будет заполнена с сервера
        const PIXEL_SIZE = 10;
        let cooldownEnd = 0;

        // Проверка сохранённой сессии
        const savedNick = localStorage.getItem('pixelbattle_nick');
        if (savedNick) {
            // Попробуем автоматически войти
            attemptAutoLogin(savedNick);
        }

        // Вкладки
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                loginForm.style.display = tab === 'login' ? 'block' : 'none';
                registerForm.style.display = tab === 'register' ? 'block' : 'none';
                authError.textContent = '';
            });
        });

        // Регистрация
        registerBtn.addEventListener('click', () => {
            const nick = regNick.value.trim();
            const pass = regPass.value;
            if (!nick || !pass) { authError.textContent = 'Заполните все поля'; return; }
            if (!socket) socket = io();
            socket.emit('register', { nickname: nick, password: pass }, (res) => {
                if (res.ok) {
                    authError.textContent = '';
                    alert('Регистрация успешна! Теперь войдите.');
                    document.querySelector('[data-tab="login"]').click();
                    loginNick.value = nick;
                } else {
                    authError.textContent = res.msg;
                }
            });
        });

        // Вход
        loginBtn.addEventListener('click', () => {
            const nick = loginNick.value.trim();
            const pass = loginPass.value;
            if (!nick || !pass) { authError.textContent = 'Заполните все поля'; return; }
            if (!socket) socket = io();
            socket.emit('login', { nickname: nick, password: pass }, (res) => {
                if (res.ok) {
                    authError.textContent = '';
                    onLoginSuccess(nick, res.canvas);
                    localStorage.setItem('pixelbattle_nick', nick);
                } else {
                    authError.textContent = res.msg;
                }
            });
        });

        function attemptAutoLogin(nick) {
            if (!socket) socket = io();
            socket.emit('auto login', nick, (res) => {
                if (res.ok) {
                    onLoginSuccess(nick, res.canvas);
                } else {
                    localStorage.removeItem('pixelbattle_nick');
                }
            });
        }

        function onLoginSuccess(nick, serverCanvas) {
            currentNick = nick;
            canvasData = serverCanvas;
            authPanel.style.display = 'none';
            gamePanel.style.display = 'block';
            renderCanvas();
            
            socket.on('online update', (list) => {
                onlineSpan.textContent = list.length;
            });
            socket.on('pixel update', (data) => {
                canvasData[data.x][data.y] = data.color;
                drawPixel(data.x, data.y, data.color);
            });
            socket.on('force logout', () => {
                alert('Вас отключили, так как вы зашли с другого устройства.');
                logout();
            });
        }

        function renderCanvas() {
            for (let gx = 0; gx < canvasData.length; gx++) {
                for (let gy = 0; gy < canvasData[0].length; gy++) {
                    drawPixel(gx, gy, canvasData[gx][gy]);
                }
            }
        }

        function drawPixel(gx, gy, color) {
            ctx.fillStyle = color;
            ctx.fillRect(gx * PIXEL_SIZE, gy * PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
        }

        // Рисование
        canvas.addEventListener('click', (e) => {
            if (!socket || !currentNick) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const canvasX = (e.clientX - rect.left) * scaleX;
            const canvasY = (e.clientY - rect.top) * scaleY;
            
            socket.emit('draw pixel', { x: canvasX, y: canvasY, color: pixelColor.value }, (res) => {
                if (res.ok) {
                    statusMsg.textContent = '';
                    startCooldown(res.cooldown);
                } else {
                    statusMsg.textContent = res.msg;
                }
            });
        });

        function startCooldown(ms) {
            cooldownEnd = Date.now() + ms;
            updateCooldownDisplay();
            const interval = setInterval(() => {
                if (Date.now() >= cooldownEnd) {
                    cooldownDiv.textContent = '⏳ Готово';
                    clearInterval(interval);
                } else {
                    updateCooldownDisplay();
                }
            }, 200);
        }

        function updateCooldownDisplay() {
            const remain = Math.max(0, cooldownEnd - Date.now());
            const sec = (remain / 1000).toFixed(1);
            cooldownDiv.textContent = `⏳ ${sec} сек`;
        }

        // Выход
        logoutBtn.addEventListener('click', logout);
        function logout() {
            localStorage.removeItem('pixelbattle_nick');
            if (socket) socket.disconnect();
            socket = null;
            currentNick = null;
            authPanel.style.display = 'block';
            gamePanel.style.display = 'none';
            loginNick.value = '';
            loginPass.value = '';
            authError.textContent = '';
        }

        window.addEventListener('beforeunload', () => {
            if (socket) socket.disconnect();
        });
    })();
</script>
</body>
</html>
