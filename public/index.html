<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎨 Pixel Battle</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b0e14;
            color: #e0e5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        body.light-theme {
            background: #f5f7fa;
            color: #1a1e2c;
        }
        #app {
            width: 100%;
            max-width: 1400px;
            padding: 12px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Панель аутентификации */
        #auth-panel {
            background: rgba(30, 36, 50, 0.9);
            backdrop-filter: blur(12px);
            padding: 32px 24px;
            border-radius: 32px;
            text-align: center;
            max-width: 400px;
            margin: auto;
            border: 1px solid rgba(108, 158, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .light-theme #auth-panel {
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #8a9bb5;
            font-size: 18px;
            font-weight: 600;
            padding: 10px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .light-theme .tab-btn { color: #5a6a8a; }
        .tab-btn.active {
            background: #6c9eff;
            color: white;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border-radius: 16px;
            border: none;
            background: #1e2432;
            color: white;
            margin-bottom: 12px;
            outline: 2px solid transparent;
            transition: outline 0.2s;
        }
        .light-theme .input-field {
            background: #e9ecf0;
            color: #1a1e2c;
        }
        .input-field:focus {
            outline: 2px solid #6c9eff;
        }
        .btn {
            padding: 14px 24px;
            background: #6c9eff;
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        .btn:hover {
            background: #5a8af0;
            transform: translateY(-2px);
        }
        .btn.secondary {
            background: #3e4e6e;
        }
        #auth-error {
            color: #ff7b7b;
            margin-top: 12px;
            min-height: 24px;
        }

        /* Игровая панель */
        #game-panel {
            display: none;
            flex: 1;
            height: 100%;
        }
        .game-layout {
            display: flex;
            gap: 16px;
            height: 100%;
        }

        /* Левая панель (чат) */
        .left-panel {
            width: 300px;
            background: rgba(30, 36, 50, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(108, 158, 255, 0.2);
        }
        .light-theme .left-panel {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .online-badge {
            background: #2a3348;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .light-theme .online-badge {
            background: #e0e5f0;
        }
        .icon-btn {
            background: #2a3348;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .light-theme .icon-btn {
            background: #e0e5f0;
            color: #1a1e2c;
        }
        .icon-btn:hover {
            background: #3e4e6e;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            backdrop-filter: blur(4px);
        }
        .light-theme .chat-messages {
            background: rgba(0,0,0,0.05);
        }
        .chat-message {
            margin-bottom: 6px;
            word-break: break-word;
            line-height: 1.4;
        }
        .chat-message b {
            color: #6c9eff;
        }
        .chat-input-container {
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 20px;
            border: none;
            background: #1e2432;
            color: white;
            font-size: 14px;
        }
        .light-theme .chat-input {
            background: #e9ecf0;
            color: #1a1e2c;
        }
        #command-hints {
            background: #2a3348dd;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }
        .hint-item {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
        }
        .hint-item:hover {
            background: #4a5a7a;
        }

        /* Центральная панель (холст) */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }
        .canvas-container {
            background: #1e2432;
            padding: 12px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(108, 158, 255, 0.3);
            position: relative;
            max-width: 100%;
        }
        .light-theme .canvas-container {
            background: #ddd;
        }
        canvas {
            display: block;
            background: white;
            border-radius: 16px;
            width: 100%;
            height: auto;
            cursor: none;
            touch-action: none;
        }
        #preview-canvas {
            position: absolute;
            top: 12px;
            left: 12px;
            pointer-events: none;
        }
        .cooldown-bar {
            margin-top: 16px;
            width: 100%;
            height: 8px;
            background: #2a3348;
            border-radius: 4px;
            overflow: hidden;
        }
        .cooldown-fill {
            height: 100%;
            width: 100%;
            background: #6c9eff;
            transition: width 0.1s linear;
        }
        #status-msg {
            color: #ff7b7b;
            font-size: 14px;
            margin-top: 8px;
            min-height: 20px;
        }
        #admin-indicator {
            margin-left: 8px;
            font-size: 18px;
        }

        /* Правая панель (палитра) */
        .right-panel {
            width: 220px;
            background: rgba(30, 36, 50, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(108, 158, 255, 0.2);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .light-theme .right-panel {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
        }
        .right-panel h4 {
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
        }
        .color-palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .color-swatch {
            aspect-ratio: 1;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .color-swatch:hover {
            transform: scale(1.1);
            border-color: white;
        }
        .color-swatch.selected {
            border: 3px solid white;
            box-shadow: 0 0 15px #6c9eff;
        }
        .selected-color-preview {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            background: #ff0000;
            margin-left: 8px;
            vertical-align: middle;
            border: 2px solid white;
        }

        /* Адаптация под мобильные */
        @media (max-width: 800px) {
            #app { padding: 8px; height: auto; min-height: 100vh; }
            .game-layout {
                flex-direction: column;
                height: auto;
            }
            .left-panel, .right-panel {
                width: 100%;
                max-height: 300px;
            }
            .center-panel {
                order: -1;
            }
            .canvas-container {
                padding: 8px;
            }
        }
        @media (max-width: 480px) {
            .panel-header {
                flex-wrap: wrap;
            }
            .chat-messages {
                max-height: 150px;
            }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="app">
    <div id="auth-panel">
        <div class="tabs">
            <button class="tab-btn active" data-tab="login">Вход</button>
            <button class="tab-btn" data-tab="register">Регистрация</button>
        </div>
        <div id="login-form">
            <input type="text" id="login-nickname" class="input-field" placeholder="Логин" maxlength="15" autocomplete="off">
            <input type="password" id="login-password" class="input-field" placeholder="Пароль" autocomplete="off">
            <button class="btn" id="login-btn">Войти</button>
        </div>
        <div id="register-form" style="display:none;">
            <input type="text" id="reg-nickname" class="input-field" placeholder="Логин" maxlength="15" autocomplete="off">
            <input type="password" id="reg-password" class="input-field" placeholder="Пароль" autocomplete="off">
            <button class="btn" id="register-btn">Зарегистрироваться</button>
        </div>
        <div id="auth-error"></div>
    </div>

    <div id="game-panel">
        <div class="game-layout">
            <div class="left-panel">
                <div class="panel-header">
                    <div class="online-badge">
                        <span>👥</span>
                        <span id="online-count">0</span>
                    </div>
                    <div style="display: flex; gap: 6px;">
                        <button class="icon-btn" id="toggle-chat-btn" title="Скрыть чат">💬</button>
                        <button class="icon-btn" id="settings-btn" title="Сменить тему">🌓</button>
                        <button class="icon-btn" id="logout-btn" title="Выйти">🚪</button>
                    </div>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div id="command-hints"></div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Сообщение или /команда" maxlength="200" autocomplete="off">
                    <button class="icon-btn" id="send-chat-btn" style="width: 48px;">➤</button>
                </div>
            </div>

            <div class="center-panel">
                <div class="canvas-container">
                    <canvas id="canvas" width="800" height="600"></canvas>
                    <canvas id="preview-canvas" width="800" height="600"></canvas>
                </div>
                <div class="cooldown-bar">
                    <div class="cooldown-fill" id="cooldown-fill"></div>
                </div>
                <div id="status-msg"></div>
                <div id="admin-indicator"></div>
            </div>

            <div class="right-panel">
                <h4>🎨 Палитра</h4>
                <div class="color-palette" id="color-palette"></div>
                <div style="margin-top: 16px; display: flex; align-items: center; justify-content: center;">
                    <span>Выбран:</span>
                    <span id="selected-color-preview" class="selected-color-preview"></span>
                </div>
                <p style="font-size:12px; opacity:0.7; text-align:center; margin-top:12px;">Клик — поставить пиксель</p>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        // DOM элементы
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');
        
        const tabBtns = document.querySelectorAll('.tab-btn');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const authError = document.getElementById('auth-error');
        const loginNick = document.getElementById('login-nickname');
        const loginPass = document.getElementById('login-password');
        const regNick = document.getElementById('reg-nickname');
        const regPass = document.getElementById('reg-password');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const toggleChatBtn = document.getElementById('toggle-chat-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const onlineSpan = document.getElementById('online-count');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendChatBtn = document.getElementById('send-chat-btn');
        const cooldownFill = document.getElementById('cooldown-fill');
        const statusMsg = document.getElementById('status-msg');
        const adminIndicator = document.getElementById('admin-indicator');
        const colorPalette = document.getElementById('color-palette');
        const selectedColorPreview = document.getElementById('selected-color-preview');
        const commandHints = document.getElementById('command-hints');

        // Состояние
        let socket, currentNick = null, canvasData = [];
        const PIXEL_SIZE = 10;
        let cooldownEnd = 0, globalCooldown = 5000;
        let selectedColor = '#ff0000';
        let isAdmin = false;
        let chatHidden = false;
        let darkTheme = true;

        const publicCommands = ['/help'];
        const adminCommands = ['/cooldown', '/ban', '/unban', '/clear', '/kick', '/op'];

        // Палитра
        const colors = ['#ffffff','#c0c0c0','#808080','#000000','#ff0000','#800000','#ffff00','#808000','#00ff00','#008000','#00ffff','#008080','#0000ff','#000080','#ff00ff','#800080','#ffa500','#ffc0cb','#a52a2a','#f5f5dc','#e6e6fa','#d3d3d3','#98fb98','#ffb6c1','#ffd700','#cd853f','#4b0082','#2e8b57','#dc143c','#1e90ff','#32cd32','#ff69b4'];
        colors.forEach(c => {
            const s = document.createElement('div'); s.className = 'color-swatch'; s.style.backgroundColor = c;
            s.addEventListener('click', () => { document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('selected')); s.classList.add('selected'); selectedColor = c; selectedColorPreview.style.backgroundColor = c; });
            if (c === selectedColor) { s.classList.add('selected'); selectedColorPreview.style.backgroundColor = c; }
            colorPalette.appendChild(s);
        });

        // Звук
        const placeSound = new Audio('data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVoAAACAgICAf39/f3//AAAA//8AAP//AAD//wAA//8AAP//AAD//wAA//8AAP//AAD//wAA//8AAP//AAD//wAA//8AAP//w==');

        // Предпросмотр с обводкой
        let mouseGridX = -1, mouseGridY = -1;
        function updatePreview(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            if (canvasX < 0 || canvasX >= 800 || canvasY < 0 || canvasY >= 600) {
                mouseGridX = mouseGridY = -1;
            } else {
                mouseGridX = Math.floor(canvasX / PIXEL_SIZE);
                mouseGridY = Math.floor(canvasY / PIXEL_SIZE);
            }
            drawPreview();
        }
        function drawPreview() {
            previewCtx.clearRect(0, 0, 800, 600);
            if (mouseGridX === -1 || mouseGridY === -1) return;
            const x = mouseGridX * PIXEL_SIZE;
            const y = mouseGridY * PIXEL_SIZE;
            previewCtx.fillStyle = selectedColor + '80';
            previewCtx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
            previewCtx.strokeStyle = '#000000';
            previewCtx.lineWidth = 2;
            previewCtx.strokeRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
        }
        canvas.addEventListener('mousemove', (e) => updatePreview(e.clientX, e.clientY));
        canvas.addEventListener('mouseleave', () => { mouseGridX = mouseGridY = -1; drawPreview(); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const touch = e.touches[0]; updatePreview(touch.clientX, touch.clientY); }, {passive: false});
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; updatePreview(touch.clientX, touch.clientY); }, {passive: false});
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); mouseGridX = mouseGridY = -1; drawPreview(); });

        // Тема
        function setTheme(dark) {
            darkTheme = dark;
            document.body.classList.toggle('light-theme', !dark);
            localStorage.setItem('pixel_theme', dark ? 'dark' : 'light');
        }
        const savedTheme = localStorage.getItem('pixel_theme');
        if (savedTheme) setTheme(savedTheme === 'dark');
        settingsBtn.addEventListener('click', () => setTheme(!darkTheme));

        // Сессия
        const savedNick = localStorage.getItem('pixelbattle_nick');
        if (savedNick) attemptAutoLogin(savedNick);

        // Вкладки
        tabBtns.forEach(b => b.addEventListener('click', () => {
            tabBtns.forEach(t => t.classList.remove('active')); b.classList.add('active');
            loginForm.style.display = b.dataset.tab === 'login' ? 'block' : 'none';
            registerForm.style.display = b.dataset.tab === 'register' ? 'block' : 'none';
            authError.textContent = '';
        }));

        registerBtn.addEventListener('click', () => {
            const n = regNick.value.trim(), p = regPass.value;
            if (!n || !p) { authError.textContent = 'Заполните поля'; return; }
            if (!socket) socket = io();
            socket.emit('register', { nickname: n, password: p }, res => {
                if (res.ok) { alert('Успешно!'); document.querySelector('[data-tab="login"]').click(); loginNick.value = n; }
                else authError.textContent = res.msg;
            });
        });

        loginBtn.addEventListener('click', () => {
            const n = loginNick.value.trim(), p = loginPass.value;
            if (!n || !p) { authError.textContent = 'Заполните поля'; return; }
            if (!socket) socket = io();
            socket.emit('login', { nickname: n, password: p }, res => {
                if (res.ok) { onLoginSuccess(n, res.canvas, res.cooldown); localStorage.setItem('pixelbattle_nick', n); }
                else authError.textContent = res.msg;
            });
        });

        function attemptAutoLogin(nick) {
            if (!socket) socket = io();
            socket.emit('auto login', nick, res => { if (res.ok) onLoginSuccess(nick, res.canvas, res.cooldown); else localStorage.removeItem('pixelbattle_nick'); });
        }

        function onLoginSuccess(nick, servCanvas, cd) {
            currentNick = nick; canvasData = servCanvas; globalCooldown = cd;
            authPanel.style.display = 'none'; gamePanel.style.display = 'block';
            renderCanvas();
            socket.on('online update', list => onlineSpan.textContent = list.length);
            socket.on('pixel update', data => { canvasData[data.x][data.y] = data.color; drawPixel(data.x, data.y, data.color); });
            socket.on('force logout', () => { alert('Вас отключили'); logout(); });
            socket.on('banned', () => { alert('Вы забанены'); logout(); });
            socket.on('chat message', data => addChatMessage(data.sender, data.text));
            socket.on('admin status', status => { isAdmin = status; adminIndicator.textContent = status ? '👑' : ''; });
            socket.on('cooldown update', cd => globalCooldown = cd);
            socket.on('canvas reset', newCanvas => { canvasData = newCanvas; renderCanvas(); });
        }

        function renderCanvas() { for (let x=0; x<canvasData.length; x++) for (let y=0; y<canvasData[0].length; y++) drawPixel(x, y, canvasData[x][y]); }
        function drawPixel(gx, gy, color) { ctx.fillStyle = color; ctx.fillRect(gx*PIXEL_SIZE, gy*PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE); }

        function addChatMessage(sender, text) {
            const div = document.createElement('div'); div.className = 'chat-message';
            div.innerHTML = `<b>${sender}:</b> ${text}`; chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Подсказки команд
        function updateHints(input) {
            if (!input.startsWith('/')) { commandHints.style.display = 'none'; return; }
            let available = publicCommands;
            if (isAdmin) available = [...publicCommands, ...adminCommands];
            const filtered = available.filter(c => c.startsWith(input.split(' ')[0]));
            if (filtered.length === 0) { commandHints.style.display = 'none'; return; }
            commandHints.style.display = 'block';
            commandHints.innerHTML = filtered.map(c => `<div class="hint-item" data-cmd="${c}">${c}</div>`).join('');
            document.querySelectorAll('.hint-item').forEach(el => {
                el.addEventListener('click', () => {
                    chatInput.value = el.dataset.cmd + ' ';
                    chatInput.focus();
                    updateHints(chatInput.value);
                });
            });
        }
        chatInput.addEventListener('input', () => updateHints(chatInput.value));
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const hint = commandHints.querySelector('.hint-item');
                if (hint) { chatInput.value = hint.dataset.cmd + ' '; updateHints(chatInput.value); }
            }
        });

        sendChatBtn.addEventListener('click', () => {
            const msg = chatInput.value.trim(); if (!msg) return;
            if (msg.startsWith('/')) socket.emit('admin command', msg);
            else socket.emit('chat message', msg);
            chatInput.value = ''; commandHints.style.display = 'none';
        });
        chatInput.addEventListener('keypress', e => { if (e.key==='Enter') sendChatBtn.click(); });

        // Рисование
        function tryPlacePixel(clientX, clientY) {
            if (!socket) return;
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.width / rect.width;
            const x = (clientX - rect.left) * scale, y = (clientY - rect.top) * scale;
            socket.emit('draw pixel', { x, y, color: selectedColor }, res => {
                if (res.ok) { statusMsg.textContent = ''; placeSound.play().catch(()=>{}); startCooldown(globalCooldown); }
                else statusMsg.textContent = res.msg;
            });
        }
        canvas.addEventListener('click', e => tryPlacePixel(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => { e.preventDefault(); const touch = e.touches[0]; tryPlacePixel(touch.clientX, touch.clientY); }, {passive: false});

        function startCooldown(ms) {
            cooldownEnd = Date.now() + ms;
            const update = () => {
                const remain = Math.max(0, cooldownEnd - Date.now());
                cooldownFill.style.width = ((ms - remain) / ms * 100) + '%';
                if (remain > 0) requestAnimationFrame(update);
            };
            update();
        }

        toggleChatBtn.addEventListener('click', () => {
            chatHidden = !chatHidden;
            document.querySelector('.chat-messages').style.display = chatHidden ? 'none' : 'block';
            document.querySelector('.chat-input-container').style.display = chatHidden ? 'none' : 'flex';
            commandHints.style.display = 'none';
            toggleChatBtn.textContent = chatHidden ? '💬' : '💬';
            toggleChatBtn.style.opacity = chatHidden ? '0.6' : '1';
        });

        logoutBtn.addEventListener('click', logout);
        function logout() {
            localStorage.removeItem('pixelbattle_nick');
            if (socket) socket.disconnect(); socket = null;
            currentNick = null; authPanel.style.display = 'flex'; gamePanel.style.display = 'none';
            authPanel.style.display = 'block';
        }
        window.addEventListener('beforeunload', () => socket?.disconnect());
    })();
</script>
</body>
</html>
