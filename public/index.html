<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>2D Sandbox — Hotbar & Smooth</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1e2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
        }
        #login-container {
            background: #2a2f42;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            text-align: center;
            color: #e0e5f0;
            max-width: 90vw;
        }
        #login-container h2 { color: #6c9eff; margin-top: 0; }
        #nickname-input {
            padding: 10px 15px;
            font-size: 16px;
            width: 100%;
            max-width: 260px;
            border: none;
            border-radius: 6px;
            background: #1e2332;
            color: white;
            margin: 15px 0;
            outline: 1px solid #3e4a6b;
        }
        #color-picker { margin: 10px 0; }
        #color-picker label { display: block; margin-bottom: 5px; color: #b0bbd5; }
        #join-btn {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            background: #6c9eff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            width: 100%;
        }
        #join-btn:hover { background: #5a8af0; }
        #error-message { color: #ff7b7b; margin-top: 12px; min-height: 20px; }

        #game-container {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #6a8e5a;
            touch-action: none;
            cursor: crosshair;
        }

        /* UI */
        #ui-overlay {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(30, 34, 50, 0.85);
            backdrop-filter: blur(4px);
            color: #e0e5f0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid #4a5a7a;
            pointer-events: none;
            z-index: 10;
        }
        #player-list h3 { margin: 0 0 6px 0; color: #6c9eff; font-size: 16px; }
        #player-list ul { margin: 0; padding-left: 18px; }
        #ping-fps {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(30, 34, 50, 0.7);
            color: #aab5d0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
        }
        #coords {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(30,34,50,0.7);
            color: #aab5d0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
        }

        /* Хотбар */
        #hotbar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: rgba(20, 25, 40, 0.8);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #4a5a7a;
            z-index: 30;
        }
        .hotbar-slot {
            width: 50px;
            height: 50px;
            background: #2a3348;
            border: 2px solid #5a6a8a;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            transition: 0.1s;
            box-shadow: inset 0 0 5px #00000050;
            cursor: pointer;
            user-select: none;
        }
        .hotbar-slot.selected {
            border-color: #ffd966;
            background: #3e4e6e;
            transform: scale(1.05);
            box-shadow: 0 0 12px #ffd96680;
        }
        .hotbar-slot span {
            font-size: 12px;
            margin-left: 2px;
        }

        /* Мобильные контролы */
        #mobile-controls {
            position: absolute;
            bottom: 90px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }
        #joystick-area {
            width: 140px;
            height: 140px;
            background: rgba(20, 25, 40, 0.4);
            border-radius: 70px;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.25);
            pointer-events: auto;
            touch-action: none;
            position: relative;
        }
        #joystick-thumb {
            position: absolute;
            width: 70px;
            height: 70px;
            background: rgba(108, 158, 255, 0.7);
            border-radius: 35px;
            left: 35px;
            top: 35px;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        #action-button {
            width: 90px;
            height: 90px;
            background: rgba(200, 70, 70, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 45px;
            border: 3px solid rgba(255,255,255,0.5);
            color: white;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            touch-action: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 10px;
        }
        #action-button:active {
            background: rgba(220, 50, 50, 0.9);
            transform: scale(0.95);
        }

        @media (pointer: fine) {
            #mobile-controls { display: none; }
        }
        @media (max-width: 600px) {
            .hotbar-slot { width: 40px; height: 40px; font-size: 16px; }
            #ui-overlay { font-size: 12px; padding: 8px; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="login-container">
        <h2>🎮 2D Sandbox</h2>
        <input type="text" id="nickname-input" placeholder="Введите ник" maxlength="15" autocomplete="off" enterkeyhint="done">
        <div id="color-picker">
            <label>Цвет персонажа:</label>
            <input type="color" id="player-color" value="#3498db">
        </div>
        <button id="join-btn">Войти в игру</button>
        <div id="error-message"></div>
        <p style="font-size:13px; color:#8a9bb5; margin-top:15px;">
            ПК: WASD/стрелки + клик<br>📱: Джойстик + кнопка<br>1-9: хотбар
        </p>
    </div>

    <div id="game-container">
        <canvas id="game-canvas" width="800" height="600"></canvas>
        
        <div id="ui-overlay">
            <div id="player-list">
                <h3>👥 Игроки онлайн</h3>
                <ul id="players-online"></ul>
            </div>
        </div>
        <div id="ping-fps">🔌 Подключение...</div>
        <div id="coords">x: 0, y: 0</div>

        <!-- Хотбар -->
        <div id="hotbar-container">
            <!-- Слоты будут сгенерированы JS -->
        </div>

        <!-- Мобильные контролы -->
        <div id="mobile-controls">
            <div id="joystick-area">
                <div id="joystick-thumb"></div>
            </div>
            <div id="action-button">💥</div>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ---------- DOM ----------
            const loginContainer = document.getElementById('login-container');
            const gameContainer = document.getElementById('game-container');
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const nicknameInput = document.getElementById('nickname-input');
            const colorInput = document.getElementById('player-color');
            const joinBtn = document.getElementById('join-btn');
            const errorMsg = document.getElementById('error-message');
            const playersList = document.getElementById('players-online');
            const pingFpsDiv = document.getElementById('ping-fps');
            const coordsDiv = document.getElementById('coords');
            const hotbarContainer = document.getElementById('hotbar-container');

            const joystickArea = document.getElementById('joystick-area');
            const joystickThumb = document.getElementById('joystick-thumb');
            const actionBtn = document.getElementById('action-button');

            // ---------- Состояние ----------
            let socket;
            let selfPlayer = null;
            let players = {};
            let mapWidth = 2000, mapHeight = 2000, tileSize = 40;
            
            let camera = { x: 0, y: 0 };
            let worldTiles = [];

            // Интерполяция других игроков
            const interpolatedPositions = {};
            const INTERP_SPEED = 0.3;

            // Предсказание движения (клиентская физика)
            let clientPredictedX = 0, clientPredictedY = 0;
            let serverConfirmedX = 0, serverConfirmedY = 0;
            let lastServerUpdate = 0;

            // Управление ПК
            const keyState = {
                KeyW: false, KeyA: false, KeyS: false, KeyD: false,
                ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
            };
            
            // Мобильное
            let joystickActive = false;
            let joystickVector = { x: 0, y: 0 };
            const joystickMaxDist = 50;
            let actionPressed = false;

            const MOVE_SPEED = 6.0;
            
            let latency = 0;
            let lastPingTime = 0;
            
            // FPS
            let frameCount = 0;
            let lastFpsUpdate = performance.now();
            let fps = 60;

            // Хотбар
            let selectedSlot = 0;
            const hotbarSlots = [];
            const hotbarItems = ['🪓', '⛏️', '🗡️', '🍎', '🪨', '🌳', '🔥', '💧', '📦']; // эмодзи для примера

            // ---------- Хотбар UI ----------
            function createHotbar() {
                hotbarContainer.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'hotbar-slot' + (i === selectedSlot ? ' selected' : '');
                    slot.innerHTML = hotbarItems[i] || '';
                    slot.addEventListener('click', () => selectSlot(i));
                    hotbarContainer.appendChild(slot);
                    hotbarSlots.push(slot);
                }
            }
            function selectSlot(index) {
                selectedSlot = index;
                hotbarSlots.forEach((s, i) => {
                    s.classList.toggle('selected', i === index);
                });
            }
            // Переключение клавишами 1-9
            window.addEventListener('keydown', (e) => {
                const num = parseInt(e.key);
                if (!isNaN(num) && num >= 1 && num <= 9) {
                    selectSlot(num - 1);
                    e.preventDefault();
                }
            });

            // ---------- Сеть ----------
            function connect() {
                socket = io({ transports: ['websocket'], upgrade: false });

                socket.on('connect', () => updatePingFps());
                socket.on('disconnect', () => updatePingFps(true));

                socket.on('init', (data) => {
                    players = data.players;
                    selfPlayer = players[socket.id];
                    mapWidth = data.map.width;
                    mapHeight = data.map.height;
                    tileSize = data.map.tileSize || 40;
                    worldTiles = data.worldTiles || [];

                    // Инициализация предсказания
                    clientPredictedX = selfPlayer.x;
                    clientPredictedY = selfPlayer.y;
                    serverConfirmedX = selfPlayer.x;
                    serverConfirmedY = selfPlayer.y;

                    for (const id in players) {
                        if (id !== selfPlayer.id) {
                            interpolatedPositions[id] = { x: players[id].x, y: players[id].y };
                        }
                    }

                    loginContainer.style.display = 'none';
                    gameContainer.style.display = 'block';
                    createHotbar();
                    
                    updateCamera();
                    requestAnimationFrame(gameLoop);
                    updatePlayersList();
                    
                    lastPingTime = performance.now();
                    socket.emit('ping');
                });

                socket.on('player joined', (player) => {
                    players[player.id] = player;
                    interpolatedPositions[player.id] = { x: player.x, y: player.y };
                    updatePlayersList();
                });

                socket.on('player left', (id) => {
                    delete players[id];
                    delete interpolatedPositions[id];
                    updatePlayersList();
                });

                socket.on('player moved', (data) => {
                    const player = players[data.id];
                    if (!player) return;
                    
                    if (data.id === selfPlayer?.id) {
                        // Серверное подтверждение позиции
                        serverConfirmedX = data.x;
                        serverConfirmedY = data.y;
                        lastServerUpdate = performance.now();
                        // Плавно корректируем предсказанную позицию
                        clientPredictedX += (data.x - clientPredictedX) * 0.2;
                        clientPredictedY += (data.y - clientPredictedY) * 0.2;
                        selfPlayer.x = clientPredictedX;
                        selfPlayer.y = clientPredictedY;
                    } else {
                        interpolatedPositions[data.id] = { x: data.x, y: data.y };
                    }
                });

                socket.on('block update', (data) => {
                    if (worldTiles[data.tileX]?.[data.tileY] !== undefined) {
                        worldTiles[data.tileX][data.tileY] = data.block;
                    }
                });

                socket.on('pong', () => {
                    latency = Math.round(performance.now() - lastPingTime);
                    updatePingFps();
                });

                setInterval(() => {
                    if (socket && socket.connected) {
                        lastPingTime = performance.now();
                        socket.emit('ping');
                    }
                }, 2000);
            }

            function updatePingFps(disconnected = false) {
                if (disconnected) pingFpsDiv.textContent = '🔴 Отключено';
                else pingFpsDiv.textContent = `📶 ${latency}ms | 🎮 ${fps} FPS`;
            }

            // ---------- Вход ----------
            function tryJoin() {
                const nickname = nicknameInput.value.trim();
                if (!nickname) { errorMsg.textContent = 'Введите ник'; return; }
                if (nickname.length > 15) { errorMsg.textContent = 'Ник слишком длинный'; return; }

                if (!socket) connect();

                socket.emit('set nickname', { nickname, color: colorInput.value }, (response) => {
                    if (response.success) errorMsg.textContent = '';
                    else {
                        errorMsg.textContent = response.message;
                        socket.disconnect();
                        socket = null;
                    }
                });
            }

            joinBtn.addEventListener('click', tryJoin);
            nicknameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') tryJoin(); });

            // ---------- Управление ПК ----------
            window.addEventListener('keydown', (e) => {
                if (e.code in keyState) { keyState[e.code] = true; e.preventDefault(); }
                if (e.code.startsWith('Arrow')) e.preventDefault();
            });
            window.addEventListener('keyup', (e) => {
                if (e.code in keyState) { keyState[e.code] = false; e.preventDefault(); }
                if (e.code.startsWith('Arrow')) e.preventDefault();
            });
            window.addEventListener('blur', () => { for (let k in keyState) keyState[k] = false; });

            // ---------- Мобильное управление ----------
            function handleJoystickStart(e) {
                e.preventDefault();
                joystickActive = true;
                updateJoystick(e.touches[0]);
            }
            function handleJoystickMove(e) {
                e.preventDefault();
                if (!joystickActive) return;
                updateJoystick(e.touches[0]);
            }
            function handleJoystickEnd(e) {
                e.preventDefault();
                joystickActive = false;
                joystickVector = { x: 0, y: 0 };
                joystickThumb.style.transform = `translate(0px, 0px)`;
            }
            function updateJoystick(touch) {
                const rect = joystickArea.getBoundingClientRect();
                const centerX = rect.left + rect.width/2;
                const centerY = rect.top + rect.height/2;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const maxDist = joystickMaxDist;
                if (dist > maxDist) {
                    dx = dx / dist * maxDist;
                    dy = dy / dist * maxDist;
                }
                joystickThumb.style.transform = `translate(${dx}px, ${dy}px)`;
                joystickVector = { x: dx / maxDist, y: dy / maxDist };
            }

            joystickArea.addEventListener('touchstart', handleJoystickStart, {passive: false});
            joystickArea.addEventListener('touchmove', handleJoystickMove, {passive: false});
            joystickArea.addEventListener('touchend', handleJoystickEnd);
            joystickArea.addEventListener('touchcancel', handleJoystickEnd);

            actionBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                performAction();
            });

            canvas.addEventListener('mousedown', (e) => {
                if (e.button === 0) performActionFromEvent(e);
            });

            function performAction() {
                if (!selfPlayer) return;
                const dir = getDirectionVector();
                const targetX = selfPlayer.x + dir.x * 50;
                const targetY = selfPlayer.y + dir.y * 50;
                const tileX = Math.floor(targetX / tileSize);
                const tileY = Math.floor(targetY / tileSize);
                if (tileX >= 0 && tileX < mapWidth/tileSize && tileY >=0 && tileY < mapHeight/tileSize) {
                    socket.emit('break block', { tileX, tileY });
                }
            }

            function performActionFromEvent(e) {
                if (!selfPlayer) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const worldX = (e.clientX - rect.left) * scaleX + camera.x;
                const worldY = (e.clientY - rect.top) * scaleY + camera.y;
                const tileX = Math.floor(worldX / tileSize);
                const tileY = Math.floor(worldY / tileSize);
                const dist = Math.hypot(selfPlayer.x - worldX, selfPlayer.y - worldY);
                if (dist < 120) {
                    socket.emit('break block', { tileX, tileY });
                }
            }

            function getDirectionVector() {
                if (joystickActive && (joystickVector.x !== 0 || joystickVector.y !== 0)) {
                    return { x: joystickVector.x, y: joystickVector.y };
                }
                let dx = 0, dy = 0;
                if (keyState.KeyW || keyState.ArrowUp) dy -= 1;
                if (keyState.KeyS || keyState.ArrowDown) dy += 1;
                if (keyState.KeyA || keyState.ArrowLeft) dx -= 1;
                if (keyState.KeyD || keyState.ArrowRight) dx += 1;
                if (dx === 0 && dy === 0) return { x: 1, y: 0 };
                const len = Math.sqrt(dx*dx + dy*dy);
                return { x: dx/len, y: dy/len };
            }

            // ---------- Движение с предсказанием и сглаживанием ----------
            function handleInput() {
                if (!selfPlayer) return;

                let dx = 0, dy = 0;
                if (keyState.KeyW || keyState.ArrowUp) dy -= 1;
                if (keyState.KeyS || keyState.ArrowDown) dy += 1;
                if (keyState.KeyA || keyState.ArrowLeft) dx -= 1;
                if (keyState.KeyD || keyState.ArrowRight) dx += 1;

                if (joystickActive && (joystickVector.x !== 0 || joystickVector.y !== 0)) {
                    dx = joystickVector.x;
                    dy = joystickVector.y;
                }

                if (dx !== 0 || dy !== 0) {
                    const len = Math.sqrt(dx*dx + dy*dy);
                    dx = (dx / len) * MOVE_SPEED;
                    dy = (dy / len) * MOVE_SPEED;

                    // Предсказываем новую позицию
                    let newX = clientPredictedX + dx;
                    let newY = clientPredictedY + dy;
                    
                    newX = Math.max(20, Math.min(mapWidth - 20, newX));
                    newY = Math.max(20, Math.min(mapHeight - 20, newY));
                    
                    clientPredictedX = newX;
                    clientPredictedY = newY;
                    
                    // Обновляем selfPlayer для отрисовки
                    selfPlayer.x = clientPredictedX;
                    selfPlayer.y = clientPredictedY;

                    // Отправляем на сервер
                    socket.emit('move', { x: newX, y: newY, vx: dx, vy: dy });
                } else {
                    // Если стоим, синхронизируем с сервером плавно
                    clientPredictedX += (serverConfirmedX - clientPredictedX) * 0.1;
                    clientPredictedY += (serverConfirmedY - clientPredictedY) * 0.1;
                    selfPlayer.x = clientPredictedX;
                    selfPlayer.y = clientPredictedY;
                }
            }

            function interpolatePlayers() {
                for (const id in interpolatedPositions) {
                    const player = players[id];
                    if (!player) continue;
                    const target = interpolatedPositions[id];
                    player.x += (target.x - player.x) * INTERP_SPEED;
                    player.y += (target.y - player.y) * INTERP_SPEED;
                }
            }

            function updateCamera() {
                if (!selfPlayer) return;
                camera.x = Math.max(0, Math.min(mapWidth - canvas.width, selfPlayer.x - canvas.width/2));
                camera.y = Math.max(0, Math.min(mapHeight - canvas.height, selfPlayer.y - canvas.height/2));
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();
                ctx.translate(-camera.x, -camera.y);

                // Блоки
                if (worldTiles) {
                    for (let tx = 0; tx < worldTiles.length; tx++) {
                        for (let ty = 0; ty < worldTiles[tx].length; ty++) {
                            const block = worldTiles[tx][ty];
                            if (block) {
                                const x = tx * tileSize, y = ty * tileSize;
                                if (x + tileSize >= camera.x && x <= camera.x + canvas.width &&
                                    y + tileSize >= camera.y && y <= camera.y + canvas.height) {
                                    ctx.fillStyle = '#5d4a2e';
                                    ctx.fillRect(x, y, tileSize, tileSize);
                                    ctx.strokeStyle = '#3a2e1e';
                                    ctx.lineWidth = 1;
                                    ctx.strokeRect(x, y, tileSize, tileSize);
                                    ctx.fillStyle = '#3c8c3c';
                                    ctx.fillRect(x+2, y+2, tileSize-4, 5);
                                }
                            }
                        }
                    }
                }

                // Сетка
                ctx.strokeStyle = '#7a9a6c';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= mapWidth; i += tileSize) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, mapHeight); ctx.stroke();
                }
                for (let i = 0; i <= mapHeight; i += tileSize) {
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(mapWidth, i); ctx.stroke();
                }

                // Игроки
                for (const id in players) {
                    const p = players[id];
                    const isSelf = (id === selfPlayer?.id);
                    if (p.x + 30 < camera.x || p.x - 30 > camera.x + canvas.width ||
                        p.y + 30 < camera.y || p.y - 30 > camera.y + canvas.height) continue;

                    ctx.shadowColor = '#00000060'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 3;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 18, 0, 2 * Math.PI);
                    const gradient = ctx.createRadialGradient(p.x-5, p.y-5, 3, p.x, p.y, 18);
                    if (isSelf) {
                        gradient.addColorStop(0, '#aad0ff');
                        gradient.addColorStop(1, p.color || '#3498db');
                    } else {
                        gradient.addColorStop(0, '#ffb0b0');
                        gradient.addColorStop(1, p.color || '#e74c3c');
                    }
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    ctx.stroke();

                    ctx.font = 'bold 14px "Segoe UI"'; ctx.fillStyle = '#fff';
                    ctx.shadowColor = '#000'; ctx.shadowBlur = 5;
                    ctx.textAlign = 'center';
                    ctx.fillText(p.nickname, p.x, p.y - 28);
                    ctx.shadowBlur = 0;
                    if (isSelf) {
                        ctx.font = '12px "Segoe UI"'; ctx.fillStyle = '#d0e0ff';
                        ctx.fillText('(вы)', p.x, p.y - 45);
                    }
                }
                ctx.restore();

                if (selfPlayer) {
                    coordsDiv.textContent = `📍 x: ${Math.round(selfPlayer.x)} y: ${Math.round(selfPlayer.y)}`;
                }
            }

            function updatePlayersList() {
                const list = Object.values(players).map(p => 
                    `<li>${p.nickname} ${p.id === selfPlayer?.id ? '<span style="color:#6c9eff;">(вы)</span>' : ''}</li>`
                ).join('');
                playersList.innerHTML = list || '<li>Пусто</li>';
            }

            // FPS счётчик
            function updateFps() {
                frameCount++;
                const now = performance.now();
                if (now - lastFpsUpdate >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = now;
                    updatePingFps();
                }
            }

            function gameLoop() {
                handleInput();
                interpolatePlayers();
                updateCamera();
                draw();
                updatePlayersList();
                updateFps();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('beforeunload', () => { if (socket) socket.disconnect(); });

            function resizeCanvas() {
                canvas.width = gameContainer.clientWidth;
                canvas.height = gameContainer.clientHeight;
                updateCamera();
            }
            window.addEventListener('resize', resizeCanvas);
            new ResizeObserver(() => { if (gameContainer.style.display !== 'none') resizeCanvas(); }).observe(gameContainer);

        })();
    </script>
</body>
</html>
