<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 Pixel Battle Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f1219; color: #e0e5f0;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        #app { width: 100%; max-width: 1200px; padding: 10px; }
        #auth-panel {
            background: #1e2432dd; backdrop-filter: blur(8px);
            padding: 30px; border-radius: 24px; text-align: center;
            max-width: 400px; margin: 0 auto; border: 1px solid #3e4a6b;
        }
        .input-field {
            padding: 12px; font-size: 16px; border-radius: 8px;
            border: none; background: #2a3348; color: white;
            margin: 10px 0; width: 100%;
        }
        .btn {
            padding: 12px 24px; background: #6c9eff; border: none;
            border-radius: 8px; color: white; font-weight: bold;
            cursor: pointer; margin: 5px;
        }
        #game-panel { display: none; }
        .game-layout {
            display: flex; gap: 15px; flex-wrap: wrap;
        }
        .left-panel {
            width: 260px; background: #1e2432dd; backdrop-filter: blur(8px);
            border-radius: 16px; padding: 15px; display: flex; flex-direction: column;
            border: 1px solid #3e4a6b;
        }
        .center-panel {
            flex: 1; min-width: 300px;
            display: flex; flex-direction: column; align-items: center;
        }
        .right-panel {
            width: 220px; background: #1e2432dd; backdrop-filter: blur(8px);
            border-radius: 16px; padding: 15px; border: 1px solid #3e4a6b;
        }
        .canvas-container {
            background: #1e2432; padding: 10px; border-radius: 20px;
            box-shadow: 0 0 20px #00000050; border: 1px solid #3e4a6b;
            position: relative;
        }
        canvas { 
            display: block; 
            background: white; 
            border-radius: 12px; 
            width: 640px; 
            height: 640px; 
            image-rendering: crisp-edges; /* пикселизация */
            image-rendering: pixelated;
            cursor: none; 
        }
        #preview-canvas {
            position: absolute; top: 10px; left: 10px;
            pointer-events: none; image-rendering: pixelated;
            width: 640px; height: 640px;
        }
        .cooldown-bar {
            margin-top: 10px; width: 100%; height: 8px; background: #2a3348;
            border-radius: 4px; overflow: hidden;
        }
        .cooldown-fill { height: 100%; width: 100%; background: #6c9eff; }
        #status-msg { color: #ff7b7b; font-size: 13px; margin-top: 5px; }
        .online-box {
            background: #2a3348; border-radius: 12px; padding: 10px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
        }
        .chat-messages {
            flex: 1; overflow-y: auto; background: #151a24; border-radius: 12px;
            padding: 10px; margin-bottom: 10px; font-size: 14px; max-height: 200px;
        }
        .chat-input-container { display: flex; gap: 5px; }
        .chat-input {
            flex: 1; padding: 10px; border-radius: 20px; border: none;
            background: #2a3348; color: white;
        }
        .color-palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .color-swatch {
            aspect-ratio: 1; border-radius: 8px; border: 2px solid #4a5a7a;
            cursor: pointer; transition: transform 0.1s;
        }
        .color-swatch.selected { border: 3px solid white; box-shadow: 0 0 10px #6c9eff; }
        .tool-btn {
            background: #2a3348; border: 1px solid #4a5a7a; color: white;
            padding: 8px; border-radius: 8px; cursor: pointer; margin: 2px;
        }
        .tool-btn.active { background: #6c9eff; }
        #admin-panel {
            margin-top: 10px; border-top: 1px solid #4a5a7a; padding-top: 10px;
            display: none;
        }
        #tools-container {
            display: none; /* по умолчанию скрыты, показываются только админу */
        }
        @media (max-width: 800px) {
            .game-layout { flex-direction: column; }
            .left-panel, .right-panel { width: 100%; }
            canvas, #preview-canvas { width: 100%; height: auto; }
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
<div id="app">
    <div id="auth-panel">
        <h3>🎨 Pixel Battle Pro</h3>
        <input type="text" id="login-nick" class="input-field" placeholder="Логин" maxlength="15">
        <input type="password" id="login-pass" class="input-field" placeholder="Пароль">
        <button class="btn" id="login-btn">Войти</button>
        <button class="btn" id="register-btn">Регистрация</button>
        <div id="auth-error" style="color:#ff7b7b; margin-top:10px;"></div>
    </div>

    <div id="game-panel">
        <div class="game-layout">
            <div class="left-panel">
                <div class="online-box">
                    <span>👥 Онлайн: <span id="online-count">0</span></span>
                    <button class="btn" id="logout-btn" style="padding:6px;">🚪</button>
                </div>
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-container">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Сообщение или /команда">
                    <button class="btn" id="send-chat">➤</button>
                </div>
                <div id="command-hints" style="font-size:12px; margin-top:5px;"></div>
            </div>

            <div class="center-panel">
                <div class="canvas-container">
                    <canvas id="canvas" width="80" height="80"></canvas>
                    <canvas id="preview-canvas" width="80" height="80"></canvas>
                </div>
                <div class="cooldown-bar"><div class="cooldown-fill" id="cooldown-fill"></div></div>
                <div id="status-msg"></div>
                <div id="admin-indicator"></div>
            </div>

            <div class="right-panel">
                <h4>🎨 Палитра (16)</h4>
                <div class="color-palette" id="color-palette"></div>
                <div>Выбран: <span id="selected-color-preview" style="display:inline-block; width:20px; height:20px; border-radius:4px; background:#ff0000;"></span></div>
                
                <!-- Инструменты только для админа -->
                <div id="tools-container">
                    <h4>🛠️ Инструменты</h4>
                    <div>
                        <button class="tool-btn active" data-tool="brush">🖌️ Кисть</button>
                        <button class="tool-btn" data-tool="fill">🪣 Заливка</button>
                        <button class="tool-btn" data-tool="picker">💉 Пипетка</button>
                        <button class="tool-btn" data-tool="eraser">🧽 Ластик</button>
                    </div>
                    <div style="margin:10px 0;">
                        <label>Размер кисти:</label>
                        <select id="brush-size">
                            <option value="1">1x1</option>
                            <option value="2">2x2</option>
                            <option value="3">3x3</option>
                        </select>
                    </div>
                </div>

                <div id="admin-panel">
                    <hr>
                    <h4>👑 Админ</h4>
                    <input type="file" id="image-upload" accept="image/*" style="display:none;">
                    <button class="btn" id="upload-btn">📷 Загрузить фото</button>
                    <button class="btn" id="clear-canvas">🧹 Очистить</button>
                    <div><input type="number" id="cooldown-input" placeholder="Задержка (сек)" min="0" style="width:100%; padding:5px;"></div>
                    <button class="btn" id="set-cooldown">Установить</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function(){
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');

        const loginNick = document.getElementById('login-nick');
        const loginPass = document.getElementById('login-pass');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const authError = document.getElementById('auth-error');
        const logoutBtn = document.getElementById('logout-btn');
        const onlineSpan = document.getElementById('online-count');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendChat = document.getElementById('send-chat');
        const statusMsg = document.getElementById('status-msg');
        const adminIndicator = document.getElementById('admin-indicator');
        const adminPanel = document.getElementById('admin-panel');
        const toolsContainer = document.getElementById('tools-container');
        const uploadBtn = document.getElementById('upload-btn');
        const imageUpload = document.getElementById('image-upload');
        const clearCanvasBtn = document.getElementById('clear-canvas');
        const cooldownInput = document.getElementById('cooldown-input');
        const setCooldownBtn = document.getElementById('set-cooldown');

        let socket;
        let currentNick = '';
        let canvasData = [];
        let globalCooldown = 3000;
        let cooldownEnd = 0;
        let selectedColor = '#ff0000';
        let isAdmin = false;
        let currentTool = 'brush';
        let brushSize = 1;

        // 16 цветов
        const colors = [
            '#ffffff','#c0c0c0','#808080','#000000',
            '#ff0000','#800000','#ffff00','#808000',
            '#00ff00','#008000','#00ffff','#008080',
            '#0000ff','#000080','#ff00ff','#800080'
        ];
        const paletteDiv = document.getElementById('color-palette');
        const colorPreview = document.getElementById('selected-color-preview');
        colors.forEach(c => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.backgroundColor = c;
            swatch.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                swatch.classList.add('selected');
                selectedColor = c;
                colorPreview.style.backgroundColor = c;
            });
            if (c === selectedColor) swatch.classList.add('selected');
            paletteDiv.appendChild(swatch);
        });

        // Инструменты (только для админа)
        document.querySelectorAll('[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });
        });
        document.getElementById('brush-size').addEventListener('change', e => brushSize = parseInt(e.target.value));

        // Предпросмотр
        let mouseGridX = -1, mouseGridY = -1;
        function updatePreview(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const canvasX = (clientX - rect.left) * scaleX;
            const canvasY = (clientY - rect.top) * scaleY;
            const gridX = Math.floor(canvasX);
            const gridY = Math.floor(canvasY);
            if (gridX >= 0 && gridX < 80 && gridY >= 0 && gridY < 80) {
                mouseGridX = gridX;
                mouseGridY = gridY;
            } else {
                mouseGridX = mouseGridY = -1;
            }
            drawPreview();
        }
        function drawPreview() {
            previewCtx.clearRect(0, 0, 80, 80);
            if (mouseGridX === -1 || mouseGridY === -1) return;
            const size = (currentTool === 'brush' || currentTool === 'eraser') ? brushSize : 1;
            previewCtx.fillStyle = selectedColor + '80';
            previewCtx.fillRect(mouseGridX, mouseGridY, size, size);
            previewCtx.strokeStyle = '#000';
            previewCtx.lineWidth = 0.5;
            previewCtx.strokeRect(mouseGridX, mouseGridY, size, size);
        }
        canvas.addEventListener('mousemove', e => updatePreview(e.clientX, e.clientY));
        canvas.addEventListener('mouseleave', () => { mouseGridX = mouseGridY = -1; drawPreview(); });
        canvas.addEventListener('touchmove', e => { 
            e.preventDefault(); 
            const touch = e.touches[0]; 
            updatePreview(touch.clientX, touch.clientY); 
        });
        canvas.addEventListener('touchstart', e => { 
            e.preventDefault(); 
            const touch = e.touches[0]; 
            updatePreview(touch.clientX, touch.clientY); 
        });
        canvas.addEventListener('touchend', () => { mouseGridX = mouseGridY = -1; drawPreview(); });

        // Сеть
        function connect() {
            socket = io();
            socket.on('online update', list => onlineSpan.textContent = list.length);
            socket.on('chat message', data => addChatMessage(data.sender, data.text));
            socket.on('pixel update', data => {
                canvasData[data.x][data.y] = data.color;
                drawPixel(data.x, data.y, data.color);
            });
            socket.on('batch update', pixels => {
                pixels.forEach(p => {
                    canvasData[p.x][p.y] = p.color;
                    drawPixel(p.x, p.y, p.color);
                });
            });
            socket.on('canvas reset', newCanvas => {
                canvasData = newCanvas;
                renderFullCanvas();
            });
            socket.on('admin status', status => {
                isAdmin = status;
                adminIndicator.textContent = status ? '👑' : '';
                adminPanel.style.display = status ? 'block' : 'none';
                toolsContainer.style.display = status ? 'block' : 'none';
            });
            socket.on('cooldown update', cd => globalCooldown = cd);
            socket.on('force logout', () => {
                alert('Вас отключили');
                logout();
            });
        }

        function addChatMessage(sender, text) {
            const div = document.createElement('div');
            div.innerHTML = `<b>${sender}:</b> ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function drawPixel(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        }

        function renderFullCanvas() {
            for (let x = 0; x < 80; x++) {
                for (let y = 0; y < 80; y++) {
                    drawPixel(x, y, canvasData[x][y]);
                }
            }
        }

        // Вход/регистрация
        loginBtn.onclick = () => {
            const nick = loginNick.value.trim();
            const pass = loginPass.value;
            if (!nick || !pass) return authError.textContent = 'Заполните поля';
            connect();
            socket.emit('login', { nickname: nick, password: pass }, (res) => {
                if (res.ok) {
                    currentNick = nick;
                    canvasData = res.canvas;
                    globalCooldown = res.cooldown;
                    authPanel.style.display = 'none';
                    gamePanel.style.display = 'block';
                    renderFullCanvas();
                    onlineSpan.textContent = res.online.length;
                } else {
                    authError.textContent = res.msg;
                }
            });
        };
        registerBtn.onclick = () => {
            const nick = loginNick.value.trim();
            const pass = loginPass.value;
            if (!nick || !pass) return authError.textContent = 'Заполните поля';
            connect();
            socket.emit('register', { nickname: nick, password: pass }, (res) => {
                if (res.ok) {
                    alert('Успешно! Теперь войдите.');
                } else {
                    authError.textContent = res.msg;
                }
            });
        };

        // Рисование
        function handleDraw(x, y) {
            if (!socket || !currentNick) return;
            
            if (isAdmin) {
                // Админские инструменты
                if (currentTool === 'brush' || currentTool === 'eraser') {
                    const color = currentTool === 'eraser' ? '#ffffff' : selectedColor;
                    const size = brushSize;
                    for (let dx = 0; dx < size; dx++) {
                        for (let dy = 0; dy < size; dy++) {
                            const nx = x + dx, ny = y + dy;
                            if (nx < 80 && ny < 80) {
                                socket.emit('draw pixel', { x: nx, y: ny, color }, (res) => {
                                    if (!res.ok) statusMsg.textContent = res.msg;
                                    else statusMsg.textContent = '';
                                });
                            }
                        }
                    }
                } else if (currentTool === 'fill') {
                    const targetColor = canvasData[x][y];
                    if (targetColor === selectedColor) return;
                    const pixels = floodFill(x, y, targetColor);
                    socket.emit('fill', { pixels, color: selectedColor }, (res) => {
                        if (!res.ok) statusMsg.textContent = res.msg;
                        else statusMsg.textContent = '';
                    });
                } else if (currentTool === 'picker') {
                    selectedColor = canvasData[x][y];
                    colorPreview.style.backgroundColor = selectedColor;
                    document.querySelectorAll('.color-swatch').forEach(s => {
                        s.classList.toggle('selected', s.style.backgroundColor === selectedColor);
                    });
                }
            } else {
                // Обычный игрок — только кисть 1x1
                socket.emit('draw pixel', { x, y, color: selectedColor }, (res) => {
                    if (!res.ok) statusMsg.textContent = res.msg;
                    else statusMsg.textContent = '';
                });
            }
        }

        function floodFill(sx, sy, targetColor) {
            const visited = Array(80).fill().map(() => Array(80).fill(false));
            const pixels = [];
            const queue = [[sx, sy]];
            visited[sx][sy] = true;
            while (queue.length) {
                const [x, y] = queue.shift();
                pixels.push({ x, y });
                const neighbors = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
                for (const [nx, ny] of neighbors) {
                    if (nx >= 0 && nx < 80 && ny >= 0 && ny < 80 && !visited[nx][ny] && canvasData[nx][ny] === targetColor) {
                        visited[nx][ny] = true;
                        queue.push([nx, ny]);
                    }
                }
            }
            return pixels;
        }

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            handleDraw(x, y);
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((touch.clientX - rect.left) * scaleX);
            const y = Math.floor((touch.clientY - rect.top) * scaleY);
            handleDraw(x, y);
        }, {passive: false});

        // Чат
        sendChat.onclick = () => {
            const msg = chatInput.value.trim();
            if (!msg) return;
            if (msg.startsWith('/')) socket.emit('admin command', msg);
            else socket.emit('chat message', msg);
            chatInput.value = '';
        };
        chatInput.addEventListener('keypress', e => { if (e.key==='Enter') sendChat.click(); });

        // Админка
        uploadBtn.onclick = () => imageUpload.click();
        imageUpload.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const tmpCanvas = document.createElement('canvas');
                    tmpCanvas.width = 80; tmpCanvas.height = 80;
                    const tmpCtx = tmpCanvas.getContext('2d');
                    tmpCtx.drawImage(img, 0, 0, 80, 80);
                    const imageData = tmpCtx.getImageData(0, 0, 80, 80);
                    const pixels = [];
                    for (let i = 0; i < 80; i++) {
                        for (let j = 0; j < 80; j++) {
                            const idx = (j * 80 + i) * 4;
                            const r = imageData.data[idx];
                            const g = imageData.data[idx+1];
                            const b = imageData.data[idx+2];
                            const a = imageData.data[idx+3];
                            if (a > 0) {
                                const hex = '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join('');
                                pixels.push({ x: i, y: j, color: hex });
                            }
                        }
                    }
                    socket.emit('upload image', pixels);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };
        clearCanvasBtn.onclick = () => socket.emit('admin command', '/clear');
        setCooldownBtn.onclick = () => {
            const val = parseInt(cooldownInput.value);
            if (!isNaN(val)) socket.emit('admin command', `/cooldown ${val}`);
        };

        logoutBtn.onclick = () => location.reload();
    })();
</script>
</body>
</html>
